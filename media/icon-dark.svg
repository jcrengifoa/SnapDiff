<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- lens ring -->
  <circle cx="8" cy="8" r="6.1" fill="none" stroke="#C5C5C5" stroke-width="1.25"/>
  <!-- right half filled = the "after" side -->
  <path d="M8 1.9 A6.1 6.1 0 0 1 8 14.1 Z" fill="#C5C5C5"/>
  <!-- center seam = the diff -->
  <line x1="8" y1="1.6" x2="8" y2="14.4" stroke="#C5C5C5" stroke-width="1.1"/>
</svg>
